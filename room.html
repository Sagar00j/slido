<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#08080a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Slido Room"/>
<link rel="manifest" href="room-manifest.json"/>
<link rel="icon" href="favicon.ico"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<title>Slido Room</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#08080a;--s1:#111114;--s2:#19191e;--s3:#222228;
--b1:#1c1c22;--b2:#2a2a33;--b3:#38384a;
--t1:#f4f4f6;--t2:#a0a0b4;--t3:#606078;
--ac:#6d5cff;--ac2:#8b7aff;--acBg:rgba(109,92,255,.08);--acB:rgba(109,92,255,.2);
--ok:#2dd4a0;--okBg:rgba(45,212,160,.08);--okB:rgba(45,212,160,.25);
--err:#ff5c5c;--errBg:rgba(255,92,92,.08);--errB:rgba(255,92,92,.25);
--warn:#ffb340;--warnBg:rgba(255,179,64,.08);
--r:12px;--font:'Inter',system-ui,-apple-system,sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--font);font-size:14px}
input,textarea,button,select{font-family:var(--font);font-size:14px}
::-webkit-scrollbar{width:0;height:0}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Layout */
#app{height:100%;display:flex;flex-direction:column}
.join-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:16px;text-align:center}
.join-screen .logo{width:56px;height:56px;border-radius:15px;background:linear-gradient(135deg,#6d5cff,#8b7aff);display:grid;place-items:center;font-size:22px;font-weight:800;color:#fff;box-shadow:0 6px 24px rgba(109,92,255,.3)}
.join-screen h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.join-screen p{color:var(--t3);font-size:13px;line-height:1.5;max-width:280px}
.field{width:100%;max-width:280px;padding:12px 14px;border-radius:10px;border:1px solid var(--b2);background:var(--s1);color:var(--t1);text-align:center;outline:none}
.field:focus{border-color:var(--ac)}
.field-code{letter-spacing:3px;font-weight:700;font-size:16px}
.btn{width:100%;max-width:280px;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,#6d5cff,#8b7aff);color:#fff;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(109,92,255,.25)}
.btn:active{transform:scale(.98)}
.recent{width:100%;max-width:280px}
.recent-title{font-size:11px;color:var(--t3);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.recent-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;background:var(--s1);border:1px solid var(--b1);margin-bottom:5px;cursor:pointer}
.recent-item:active{background:var(--acBg)}
.recent-item span{font-weight:700;color:var(--ac2);letter-spacing:1px;font-size:13px}
.recent-item small{font-size:10px;color:var(--t3)}

/* Room layout */
.room{flex:1;display:flex;flex-direction:column;overflow:hidden}
.room-hdr{padding:10px 14px;padding-top:calc(10px + env(safe-area-inset-top));border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;background:var(--bg);flex-shrink:0}
.room-hdr-l{display:flex;align-items:center;gap:6px}
.room-logo{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,#6d5cff,#8b7aff);display:grid;place-items:center;font-size:11px;font-weight:800;color:#fff}
.room-code{font-size:13px;font-weight:700;letter-spacing:.5px}
.badge{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700}
.badge-ok{background:var(--okBg);border:1px solid var(--okB);color:var(--ok)}
.badge-ac{background:var(--acBg);border:1px solid var(--acB);color:var(--ac2)}
.name-chip{padding:2px 7px;border-radius:5px;background:var(--s2);border:1px solid var(--b1);color:var(--t2);font-size:10px;cursor:pointer;font-weight:600}
.room-hdr-r{display:flex;gap:4px}
.hdr-btn{padding:5px 10px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid}
.btn-push{background:var(--okBg);border-color:var(--okB);color:var(--ok)}
.btn-leave{background:var(--errBg);border-color:var(--errB);color:var(--err)}

/* Main content area */
.room-body{flex:1;display:flex;overflow:hidden}

/* Slide panel (left) */
.slide-panel{width:0;overflow:hidden;transition:width .25s ease;background:var(--s1);border-right:1px solid var(--b1);flex-shrink:0;display:flex;flex-direction:column}
.slide-panel.open{width:min(280px,75vw)}
.sp-hdr{padding:12px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sp-hdr span{font-size:13px;font-weight:700;color:var(--t2)}
.sp-close{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer;padding:4px}
.sp-list{flex:1;overflow-y:auto;padding:8px}
.sp-slide{border-radius:8px;border:2px solid var(--b1);margin-bottom:8px;overflow:hidden;cursor:pointer;transition:border .15s}
.sp-slide.active{border-color:var(--ac)}
.sp-slide-head{padding:6px 10px;background:var(--s2);display:flex;align-items:center;justify-content:space-between}
.sp-slide-head span{font-size:11px;font-weight:700;color:var(--t2)}
.sp-slide-head small{font-size:9px;color:var(--t3)}
.sp-preview{position:relative;aspect-ratio:16/9;overflow:hidden}
.sp-inner{width:960px;height:540px;position:absolute;top:0;left:0;transform-origin:0 0;pointer-events:none}
.sp-els{padding:4px 6px}
.sp-el{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:6px;cursor:pointer;transition:background .1s;margin-bottom:2px}
.sp-el:active,.sp-el.sel{background:var(--acBg)}
.sp-tag{padding:2px 5px;border-radius:4px;font-size:8px;font-weight:800;text-transform:uppercase;flex-shrink:0}
.sp-tag-h{background:var(--warnBg);color:var(--warn)}
.sp-tag-b{background:var(--acBg);color:var(--ac2)}
.sp-tag-img{background:var(--okBg);color:var(--ok)}
.sp-tag-shape{background:rgba(236,72,153,.1);color:#ec4899}
.sp-eltext{font-size:11px;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sp-add{margin:4px 6px 8px;padding:8px;border-radius:8px;border:1px dashed var(--b2);background:none;color:var(--t3);font-size:11px;font-weight:600;cursor:pointer;width:calc(100% - 12px);text-align:center}
.sp-add:active{background:var(--acBg);color:var(--ac2);border-color:var(--acB)}

/* Editor area (right) */
.editor{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Toolbar */
.toolbar{padding:8px 12px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--bg)}
.slide-btn{padding:7px 12px;border-radius:8px;border:1px solid var(--b2);background:var(--s1);color:var(--t1);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.slide-btn:active{background:var(--acBg)}
.slide-btn svg{width:16px;height:16px;stroke:var(--t2);fill:none;stroke-width:1.5}
.tb-spacer{flex:1}
.tb-btn{padding:6px 10px;border-radius:7px;border:1px solid var(--b2);background:var(--s1);color:var(--t2);font-size:11px;font-weight:600;cursor:pointer}
.tb-btn:active{background:var(--acBg)}

/* Edit panel */
.edit-area{flex:1;overflow-y:auto;padding:16px}
.edit-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--t3)}
.edit-empty .icon{font-size:40px;opacity:.5}
.edit-empty p{font-size:13px;text-align:center;max-width:240px;line-height:1.5}

/* Element editor */
.el-editor{animation:up .2s ease}
.el-type{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.el-type .tag{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:800;text-transform:uppercase}
.el-type .label{font-size:13px;color:var(--t2);font-weight:500}
.el-field{margin-bottom:14px}
.el-label{font-size:11px;font-weight:600;color:var(--t3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.el-input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--b2);background:var(--s1);color:var(--t1);outline:none;resize:none;line-height:1.5}
.el-input:focus{border-color:var(--ac)}
.el-input-tall{min-height:120px}
.el-row{display:flex;gap:8px;margin-bottom:14px}
.el-row>*{flex:1}
.el-select{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--b2);background:var(--s1);color:var(--t1);outline:none}
.el-actions{display:flex;gap:6px;margin-top:16px;padding-top:16px;border-top:1px solid var(--b1)}
.el-save{flex:1;padding:11px;border-radius:8px;border:none;background:var(--ac);color:#fff;font-weight:700;cursor:pointer}
.el-save:active{transform:scale(.98)}
.el-del{padding:11px 16px;border-radius:8px;border:1px solid var(--errB);background:var(--errBg);color:var(--err);font-weight:600;cursor:pointer}
.el-cancel{padding:11px 16px;border-radius:8px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);font-weight:600;cursor:pointer}

/* Chat area */
.chat-section{border-top:1px solid var(--b1);flex-shrink:0;max-height:40vh;display:flex;flex-direction:column}
.chat-toggle{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:var(--s1)}
.chat-toggle:active{background:var(--s2)}
.chat-toggle span{font-size:12px;font-weight:600;color:var(--t2)}
.chat-toggle .count{padding:1px 6px;border-radius:10px;background:var(--ac);color:#fff;font-size:10px;font-weight:700;min-width:18px;text-align:center}
.chat-msgs{flex:1;overflow-y:auto;padding:8px 12px;display:none;flex-direction:column;gap:6px}
.chat-msgs.open{display:flex}
.chat-msg{max-width:80%}
.chat-msg.me{align-self:flex-end}
.chat-msg.them{align-self:flex-start}
.chat-msg .who{font-size:9px;color:var(--t3);margin-bottom:1px;padding:0 6px}
.chat-msg .bubble{padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.4;word-break:break-word}
.chat-msg.me .bubble{background:var(--ac);color:#fff;border-bottom-right-radius:3px}
.chat-msg.them .bubble{background:var(--s2);color:var(--t1);border:1px solid var(--b1);border-bottom-left-radius:3px}
.chat-msg.sys .bubble{background:var(--warnBg);color:var(--warn);font-size:11px;font-weight:600;border-radius:8px}
.chat-input-bar{padding:8px 12px;display:none;gap:6px;align-items:flex-end;border-top:1px solid var(--b1);padding-bottom:calc(8px + env(safe-area-inset-bottom))}
.chat-input-bar.open{display:flex}
.chat-field{flex:1;padding:9px 12px;border-radius:10px;border:1px solid var(--b1);background:var(--s1);color:var(--t1);outline:none;resize:none;min-height:36px;max-height:80px;font-size:13px;line-height:1.4}
.chat-send{padding:9px 14px;border-radius:10px;border:none;background:var(--ac);color:#fff;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}

/* Toast */
.toast{position:fixed;top:calc(12px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);padding:8px 18px;border-radius:10px;background:var(--s2);border:1px solid var(--b2);color:var(--t1);font-size:12px;font-weight:600;z-index:999;animation:up .2s ease;box-shadow:0 6px 24px rgba(0,0,0,.4)}
</style>
</head>
<body>
<div id="app"></div>
<script>
window.onload=function(){
if(typeof firebase==="undefined"){document.getElementById("app").innerHTML='<div style="color:var(--err);text-align:center;padding:40px">Failed to load. Refresh the page.</div>';return}
if("serviceWorker" in navigator)navigator.serviceWorker.register("room-sw.js").catch(()=>{});

const db=firebase.initializeApp({apiKey:"AIzaSyDDWPErU8hddkYNCXuC-5GGqvDtUw3QHJo",authDomain:"slido-collab.firebaseapp.com",databaseURL:"https://slido-collab-default-rtdb.firebaseio.com",projectId:"slido-collab",storageBucket:"slido-collab.firebasestorage.app",messagingSenderId:"1064736666209",appId:"1:1064736666209:web:af841c4b3c5713b121f020"}).database();

// State
const S={
  joined:false,rid:null,
  un:localStorage.getItem("slido_username")||"",
  sl:[],ch:[],us:[],
  openSlide:null,selEl:null,
  panelOpen:false,chatOpen:false,
  newMsgs:0
};
let rr=null,cr=null,ls=0;
const $=id=>document.getElementById(id);
const uid=()=>"e"+Date.now()+"_"+Math.floor(Math.random()*9999);
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// Toast
function toast(m){const d=document.createElement("div");d.className="toast";d.textContent=m;document.getElementById("app").appendChild(d);setTimeout(()=>d.remove(),2500)}

// Save rooms
function saveRoom(r){let rs=JSON.parse(localStorage.getItem("slido_rooms")||"[]");if(!rs.includes(r)){rs.unshift(r);if(rs.length>10)rs.pop();localStorage.setItem("slido_rooms",JSON.stringify(rs))}}

// Firebase
async function join(rid){
  try{
    const ref=db.ref("rooms/"+rid);
    const sn=await ref.once("value");
    if(!sn.exists()){toast("Room not found");return}
    const d=sn.val();
    rr=ref;S.rid=rid;S.joined=true;S.ch=[];S.us=[];S.newMsgs=0;
    if(d.slides)try{S.sl=JSON.parse(d.slides)}catch{}
    S.openSlide=S.sl[0]?.id||null;
    await ref.child("users/"+S.un).set({joined:Date.now(),active:true});
    // Listeners
    cr=db.ref("rooms/"+rid+"/chat");
    cr.orderByChild("ts").limitToLast(50).on("child_added",s=>{
      const m=s.val();if(m){S.ch.push({...m,k:s.key});if(S.ch.length>50)S.ch.shift();if(!S.chatOpen)S.newMsgs++;updateChat()}
    });
    db.ref("rooms/"+rid+"/users").on("value",s=>{S.us=s.val()?Object.keys(s.val()):[];updateHeader()});
    ref.child("slides").on("value",s=>{
      if(Date.now()-ls<400)return;
      try{const v=s.val();if(v){const p=JSON.parse(v);if(Array.isArray(p)&&p.length>0){S.sl=p;updateSlidePanel();updatePreview()}}}catch{}
    });
    window.location.hash="room="+rid;saveRoom(rid);toast("Joined: "+rid);R();
  }catch(e){toast("Failed to join");console.error(e)}}

function sy(){if(!rr)return;ls=Date.now();rr.child("slides").set(JSON.stringify(S.sl)).catch(()=>{})}
function pc(t,tp="text"){if(rr)rr.child("chat").push({user:S.un,text:t,ts:Date.now(),type:tp})}
function leave(){if(rr)try{rr.child("users/"+S.un).remove()}catch{};rr=null;cr=null;S.joined=false;S.rid=null;S.sl=[];S.ch=[];S.us=[];S.openSlide=null;S.selEl=null;window.location.hash="";R()}

// Get current slide and element
function curSlide(){return S.sl.find(s=>s.id===S.openSlide)}
function curEl(){const sl=curSlide();return sl?.elements.find(e=>e.id===S.selEl)}

// Partial updates
function updateHeader(){
  const h=$("roomBadge");if(h)h.textContent=S.us.length+" online";
}
function updateChat(){
  const msgs=$("chatMsgs");if(!msgs)return;
  let h="";
  S.ch.forEach(m=>{
    const me=m.user===S.un;
    const cls=m.type==="command"?"sys":(me?"me":"them");
    h+='<div class="chat-msg '+cls+'"><div class="who">'+esc(m.user)+'</div><div class="bubble">'+esc(m.text)+'</div></div>';
  });
  msgs.innerHTML=h;msgs.scrollTop=msgs.scrollHeight;
  const cnt=$("chatCount");if(cnt)cnt.textContent=S.newMsgs||"";
}
function updateSlidePanel(){
  const list=$("spList");if(!list)return;
  const sc=(list.clientWidth-16)/960;
  let h="";
  S.sl.forEach((s,i)=>{
    const isOpen=S.openSlide===s.id;
    let elsHtml="";
    s.elements.forEach(el=>{
      if(el.type==="text")elsHtml+='<div style="position:absolute;left:'+el.x+'px;top:'+el.y+'px;width:'+el.w+'px;font-size:'+el.fontSize+'px;font-weight:'+el.fontWeight+';color:'+(el.color||"#000")+';font-family:'+(el.fontFamily||"sans-serif")+';line-height:'+(el.lineHeight||1.3)+';white-space:pre-wrap;overflow:hidden">'+esc(el.content)+'</div>';
      else if(el.type==="image")elsHtml+='<img src="'+esc(el.src)+'" loading="lazy" style="position:absolute;left:'+el.x+'px;top:'+el.y+'px;width:'+el.w+'px;height:'+el.h+'px;object-fit:'+(el.objectFit||"cover")+';border-radius:'+(el.borderRadius||0)+'px"/>';
      else if(el.type==="shape")elsHtml+='<div style="position:absolute;left:'+el.x+'px;top:'+el.y+'px;width:'+el.w+'px;height:'+el.h+'px;background:'+(el.fill||"#6366f1")+';border-radius:'+(el.shape==="circle"?"50%":(el.borderRadius||0)+"px")+';opacity:'+(el.opacity??1)+'"></div>';
    });
    const bgImg=s.bgImg?'<img src="'+s.bgImg+'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness('+(s.bgBrightness??100)/100+')"/>':"";

    h+='<div class="sp-slide '+(isOpen?"active":"")+'" data-sid="'+s.id+'">';
    h+='<div class="sp-slide-head"><span>Slide '+(i+1)+'</span><small>'+s.elements.length+' elements</small></div>';
    h+='<div class="sp-preview"><div class="sp-inner" style="background:'+(s.bg||"#fff")+';transform:scale('+sc+')">'+bgImg+elsHtml+'</div></div>';
    if(isOpen&&s.elements.length>0){
      h+='<div class="sp-els">';
      s.elements.forEach(el=>{
        const isSel=S.selEl===el.id;
        const tagCls=el.type==="text"?(el.textTag==="h"?"sp-tag-h":"sp-tag-b"):el.type==="image"?"sp-tag-img":"sp-tag-shape";
        const tag=el.type==="text"?(el.textTag==="h"?"H":"B"):el.type==="image"?"IMG":"SHAPE";
        const preview=el.type==="text"?esc((el.content||"").slice(0,35)):el.type==="image"?"Image":(el.shape||el.type);
        h+='<div class="sp-el '+(isSel?"sel":"")+'" data-eid="'+el.id+'"><span class="sp-tag '+tagCls+'">'+tag+'</span><span class="sp-eltext">'+preview+'</span></div>';
      });
      h+='</div>';
    }
    if(isOpen)h+='<button class="sp-add" data-addsid="'+s.id+'">+ Add Element</button>';
    h+='</div>';
  });
  list.innerHTML=h;
  // Bind events
  list.querySelectorAll(".sp-slide-head").forEach(el=>{
    el.onclick=()=>{const sid=el.parentElement.dataset.sid;S.openSlide=S.openSlide===sid?null:sid;S.selEl=null;updateSlidePanel();updateEditor()}
  });
  list.querySelectorAll(".sp-el").forEach(el=>{
    el.onclick=e=>{e.stopPropagation();S.selEl=el.dataset.eid;updateSlidePanel();updateEditor()}
  });
  list.querySelectorAll(".sp-add").forEach(el=>{
    el.onclick=e=>{e.stopPropagation();showAddMenu(el.dataset.addsid)}
  });
}
function updateEditor(){
  const area=$("editArea");if(!area)return;
  const el=curEl();const sl=curSlide();
  if(!el){
    area.innerHTML='<div class="edit-empty"><div class="icon">👈</div><p>'+(sl?'Tap an element from the slide panel to edit it, or add a new one.':'Open the slide panel and select a slide to start editing.')+'</p></div>';
    return;
  }
  let h='<div class="el-editor">';
  // Type badge
  const tagCls=el.type==="text"?(el.textTag==="h"?"sp-tag-h":"sp-tag-b"):el.type==="image"?"sp-tag-img":"sp-tag-shape";
  const tagLabel=el.type==="text"?(el.textTag==="h"?"Headline":"Body Copy"):el.type==="image"?"Image":"Shape";
  h+='<div class="el-type"><span class="tag '+tagCls+'">'+(el.type==="text"?(el.textTag==="h"?"H":"B"):"IMG")+'</span><span class="label">'+tagLabel+'</span></div>';

  if(el.type==="text"){
    h+='<div class="el-field"><div class="el-label">Content</div><textarea class="el-input el-input-tall" id="elContent">'+esc(el.content||"")+'</textarea></div>';
    h+='<div class="el-row"><div class="el-field"><div class="el-label">Tag</div><select class="el-select" id="elTag"><option value="h" '+(el.textTag==="h"?"selected":"")+'>Headline</option><option value="b" '+(el.textTag!=="h"?"selected":"")+'>Body</option></select></div>';
    h+='<div class="el-field"><div class="el-label">Size</div><input type="number" class="el-input" id="elSize" value="'+(el.fontSize||18)+'"/></div></div>';
    h+='<div class="el-row"><div class="el-field"><div class="el-label">Weight</div><select class="el-select" id="elWeight">';
    ["300","400","500","600","700","800","900"].forEach(w=>{h+='<option value="'+w+'" '+(el.fontWeight===w?"selected":"")+'>'+w+'</option>'});
    h+='</select></div>';
    h+='<div class="el-field"><div class="el-label">Color</div><input type="color" class="el-input" id="elColor" value="'+(el.color||"#000000")+'" style="height:38px;padding:4px"/></div></div>';
  }else if(el.type==="image"){
    h+='<div class="el-field"><div class="el-label">Image URL</div><input type="url" class="el-input" id="elSrc" value="'+esc(el.src||"")+'"/></div>';
    h+='<div class="el-row"><div class="el-field"><div class="el-label">Fit</div><select class="el-select" id="elFit"><option value="contain" '+(el.objectFit==="contain"?"selected":"")+'>Fit</option><option value="cover" '+((el.objectFit||"cover")==="cover"?"selected":"")+'>Fill</option></select></div>';
    h+='<div class="el-field"><div class="el-label">Radius</div><input type="number" class="el-input" id="elRadius" value="'+(el.borderRadius||0)+'"/></div></div>';
  }else if(el.type==="shape"){
    h+='<div class="el-row"><div class="el-field"><div class="el-label">Fill</div><input type="color" class="el-input" id="elFill" value="'+(el.fill||"#6366f1")+'" style="height:38px;padding:4px"/></div>';
    h+='<div class="el-field"><div class="el-label">Opacity</div><input type="range" class="el-input" id="elOpacity" min="0" max="100" value="'+Math.round((el.opacity??1)*100)+'" style="padding:4px"/></div></div>';
  }

  h+='<div class="el-actions"><button class="el-save" id="elSave">Save Changes</button><button class="el-del" id="elDel">Delete</button><button class="el-cancel" id="elCancel">Close</button></div>';
  h+='</div>';
  area.innerHTML=h;

  // Bind save
  $("elSave").onclick=saveElement;
  $("elDel").onclick=()=>{
    const sl2=curSlide();if(!sl2)return;
    sl2.elements=sl2.elements.filter(e=>e.id!==S.selEl);
    S.selEl=null;sy();pc("Deleted element","command");updateSlidePanel();updateEditor();
  };
  $("elCancel").onclick=()=>{S.selEl=null;updateSlidePanel();updateEditor()};
}

function saveElement(){
  const el=curEl();if(!el)return;
  if(el.type==="text"){
    const content=$("elContent")?.value||"";
    const tag=$("elTag")?.value||"b";
    const size=parseInt($("elSize")?.value)||18;
    const weight=$("elWeight")?.value||"400";
    const color=$("elColor")?.value||"#000";
    el.content=content;el.textTag=tag;el.fontSize=size;el.fontWeight=weight;el.color=color;
    // Auto-adjust height
    const lines=content.split("\n").length;
    const charLines=Math.ceil(content.length/(700/size*1.8));
    el.h=Math.max(el.h||40,Math.max(lines,charLines)*size*1.4);
  }else if(el.type==="image"){
    el.src=$("elSrc")?.value||"";
    el.objectFit=$("elFit")?.value||"contain";
    el.borderRadius=parseInt($("elRadius")?.value)||0;
  }else if(el.type==="shape"){
    el.fill=$("elFill")?.value||"#6366f1";
    el.opacity=(parseInt($("elOpacity")?.value)||100)/100;
  }
  sy();pc("Updated "+el.type,"command");toast("Saved!");updateSlidePanel();
}

function showAddMenu(sid){
  const sl=S.sl.find(s=>s.id===sid);if(!sl)return;
  const type=prompt("Add element type:\n1 = Headline\n2 = Body Text\n3 = Image");
  const yOff=sl.elements.length?Math.max(...sl.elements.map(e=>(e.y||0)+(e.h||0)))+20:60;
  if(type==="1"||type?.toLowerCase()==="headline"||type?.toLowerCase()==="h"){
    sl.elements.push({id:uid(),type:"text",x:60,y:Math.min(yOff,400),w:700,h:60,content:"New Headline",fontSize:36,fontWeight:"700",color:"#0f0f0f",fontFamily:"'Inter',sans-serif",textTag:"h"});
    sy();pc("Added headline","command");
  }else if(type==="2"||type?.toLowerCase()==="body"||type?.toLowerCase()==="b"){
    sl.elements.push({id:uid(),type:"text",x:60,y:Math.min(yOff,420),w:700,h:40,content:"New body text",fontSize:18,fontWeight:"400",color:"#374151",fontFamily:"'Inter',sans-serif",textTag:"b"});
    sy();pc("Added body text","command");
  }else if(type==="3"||type?.toLowerCase()==="image"||type?.toLowerCase()==="img"){
    const url=prompt("Image URL:");
    if(url){sl.elements.push({id:uid(),type:"image",x:60,y:Math.min(yOff,350),w:400,h:250,src:url,objectFit:"contain"});sy();pc("Added image","command")}
  }
  updateSlidePanel();updateEditor();
}

function updatePreview(){updateSlidePanel()}

// Main render
function R(){
  const a=$("app");
  if(!S.joined){
    const rooms=JSON.parse(localStorage.getItem("slido_rooms")||"[]");
    a.innerHTML='<div class="join-screen"><div class="logo">S</div><h1>Slido Room</h1><p>Edit presentations with your team from your phone.</p><input class="field" id="nameIn" placeholder="Your name" value="'+esc(S.un)+'"/><input class="field field-code" id="codeIn" placeholder="Room code"/><button class="btn" id="joinBtn">Join Room</button>'+(rooms.length?'<div class="recent"><div class="recent-title">Recent rooms</div>'+rooms.map(r=>'<div class="recent-item" data-r="'+r+'"><span>'+r+'</span><small>tap to join</small></div>').join("")+'</div>':'')+'<div style="color:var(--t3);font-size:10px;margin-top:8px">slido.space</div></div>';
    $("joinBtn").onclick=()=>{
      const n=$("nameIn").value.trim(),c=$("codeIn").value.trim().toLowerCase();
      if(n){S.un=n;localStorage.setItem("slido_username",n)}
      if(!S.un){toast("Enter your name");return}
      if(!c){toast("Enter room code");return}
      join(c);
    };
    a.querySelectorAll(".recent-item").forEach(el=>el.onclick=()=>{
      const n=$("nameIn").value.trim();if(n){S.un=n;localStorage.setItem("slido_username",n)}
      if(!S.un){toast("Enter name first");return}
      join(el.dataset.r);
    });
    return;
  }

  // ROOM VIEW
  a.innerHTML=`
  <div class="room">
    <div class="room-hdr">
      <div class="room-hdr-l">
        <div class="room-logo">S</div>
        <span class="room-code">${S.rid}</span>
        <span class="badge badge-ok" id="roomBadge">${S.us.length} online</span>
        <button class="name-chip" id="nameChip">${esc(S.un)}</button>
      </div>
      <div class="room-hdr-r">
        <button class="hdr-btn btn-push" id="pushBtn">↑ Push</button>
        <button class="hdr-btn btn-leave" id="leaveBtn">Leave</button>
      </div>
    </div>
    <div class="toolbar">
      <button class="slide-btn" id="panelBtn">
        <svg viewBox="0 0 16 16"><rect x="1" y="1" width="5" height="14" rx="1"/><rect x="8" y="1" width="7" height="6" rx="1"/><rect x="8" y="9" width="7" height="6" rx="1"/></svg>
        Slides (${S.sl.length})
      </button>
      <div class="tb-spacer"></div>
      <button class="tb-btn" id="voiceBtn">🎤 Voice</button>
      <button class="tb-btn" id="newSlideBtn">+ Slide</button>
    </div>
    <div class="room-body">
      <div class="slide-panel ${S.panelOpen?"open":""}" id="slidePanel">
        <div class="sp-hdr"><span>Slides</span><button class="sp-close" id="panelClose">✕</button></div>
        <div id="spList" class="sp-list"></div>
      </div>
      <div class="editor">
        <div class="edit-area" id="editArea"></div>
        <div class="chat-section">
          <div class="chat-toggle" id="chatToggle">
            <span>💬 Team Chat</span>
            <span class="count" id="chatCount">${S.newMsgs||""}</span>
          </div>
          <div class="chat-msgs ${S.chatOpen?"open":""}" id="chatMsgs"></div>
          <div class="chat-input-bar ${S.chatOpen?"open":""}">
            <textarea class="chat-field" id="chatField" placeholder="Message your team..." rows="1"></textarea>
            <button class="chat-send" id="chatSend">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>`;

  // Bind events
  $("pushBtn").onclick=()=>{sy();toast("Pushed!")};
  $("leaveBtn").onclick=leave;
  $("nameChip").onclick=()=>{const n=prompt("Change name:",S.un);if(n?.trim()){if(rr)try{rr.child("users/"+S.un).remove()}catch{};S.un=n.trim();localStorage.setItem("slido_username",n.trim());if(rr)rr.child("users/"+n.trim()).set({joined:Date.now(),active:true});$("nameChip").textContent=S.un}};
  $("panelBtn").onclick=()=>{S.panelOpen=!S.panelOpen;$("slidePanel").classList.toggle("open");if(S.panelOpen)updateSlidePanel()};
  $("panelClose").onclick=()=>{S.panelOpen=false;$("slidePanel").classList.remove("open")};
  $("chatToggle").onclick=()=>{S.chatOpen=!S.chatOpen;S.newMsgs=0;$("chatMsgs").classList.toggle("open");$("chatField").parentElement.classList.toggle("open");$("chatCount").textContent="";if(S.chatOpen){updateChat();$("chatField").focus()}};
  $("chatSend").onclick=()=>{const v=$("chatField").value.trim();if(v){pc(v);$("chatField").value=""}};
  $("chatField").onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();const v=$("chatField").value.trim();if(v){pc(v);$("chatField").value=""}}};
  $("voiceBtn").onclick=()=>{
    if(!("webkitSpeechRecognition" in window||"SpeechRecognition" in window)){toast("Voice not supported");return}
    const r=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
    r.continuous=false;r.interimResults=false;r.lang="en-US";
    $("voiceBtn").textContent="🔴 Listening...";$("voiceBtn").style.color="var(--err)";
    r.onresult=e=>{
      const text=e.results[0][0].transcript;
      const el2=curEl();
      if(el2&&el2.type==="text"){const ci=$("elContent");if(ci){ci.value+=(ci.value?"\n":"")+text}}
      else{toast("Voice: "+text)}
      $("voiceBtn").textContent="🎤 Voice";$("voiceBtn").style.color="";
    };
    r.onerror=r.onend=()=>{$("voiceBtn").textContent="🎤 Voice";$("voiceBtn").style.color=""};
    r.start();
  };
  $("newSlideBtn").onclick=()=>{
    S.sl.push({id:uid(),x:200+S.sl.length*1100,y:200,w:960,h:540,bg:"#ffffff",tr:"fade",td:600,elements:[]});
    sy();pc("New slide added","command");toast("Slide added");
    S.openSlide=S.sl[S.sl.length-1].id;S.panelOpen=true;
    $("slidePanel").classList.add("open");updateSlidePanel();updateEditor();
  };

  // Initial render of sub-sections
  if(S.panelOpen)updateSlidePanel();
  updateEditor();
  updateChat();
}

// Auto-join
const h=window.location.hash;
if(h.startsWith("#room=")){
  const r=h.slice(6).toLowerCase();
  if(r.length>=4){if(!S.un)S.un="User_"+Math.floor(Math.random()*9999);join(r)}
  else R()
}else R();

};
</script>
</body>
